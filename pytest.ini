[pytest]
testpaths = tests
markers =
    manual: tests requiring agent/WebSearch/human verification (skipped in default CI)
addopts =
    --cov=scripts
    --cov-fail-under=80
    -m "not manual"
    -ra

# Coverage source/measurement/omit configuration lives in .coveragerc so that
# pytest-cov honours it alongside the --cov=scripts addopts above.
